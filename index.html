<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AffannnHs Monitor - Live Streaming Chart</title>
    <!-- Memuat Tailwind CSS untuk styling layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Script Utama TradingView Chart -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        /* Memastikan body dan html mengambil tinggi penuh layar tanpa scroll luar */
        html, body {
            height: 100%;
            margin: 0;
            background-color: #0b0e14; /* Warna latar belakang modern */
            color: #d1d4dc; /* Warna teks terang */
            overflow: hidden; /* Mencegah scroll pada body utama */
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        /* Animasi Flash Hijau saat Harga Naik */
        @keyframes flashUp {
            0% { background-color: rgba(16, 185, 129, 0.8); color: #fff; transform: scale(1.05); }
            100% { background-color: #1e3a2f; color: #34d399; transform: scale(1); }
        }

        /* Animasi Flash Merah saat Harga Turun */
        @keyframes flashDown {
            0% { background-color: rgba(239, 68, 68, 0.8); color: #fff; transform: scale(1.05); }
            100% { background-color: #3a1e1e; color: #f87171; transform: scale(1); }
        }

        .flash-up {
            animation: flashUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .flash-down {
            animation: flashDown 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Styling scrollbar untuk tampilan yang lebih rapi */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0b0e14;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a2e39;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #434651;
        }

        /* Efek Glow untuk Teks Header */
        .text-glow {
            text-shadow: 0 0 12px rgba(234, 179, 8, 0.6);
        }
    </style>
</head>
<body class="flex flex-col h-screen relative">

    <!-- POPUP PERINGATAN INTERNET TERPUTUS -->
    <div id="offline-popup" class="fixed top-16 left-1/2 transform -translate-x-1/2 bg-red-600/90 backdrop-blur-md text-white px-5 py-2.5 rounded-xl shadow-[0_10px_30px_rgba(220,38,38,0.4)] z-50 flex items-center gap-3 transition-all duration-500 opacity-0 pointer-events-none -translate-y-8 border border-red-400/50">
        <div class="bg-red-500 p-1.5 rounded-full animate-pulse">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414" />
            </svg>
        </div>
        <div>
            <p class="font-bold text-xs tracking-wide">Koneksi Terputus!</p>
            <p class="text-[10px] text-red-100 opacity-80">Mencoba menyambung kembali...</p>
        </div>
    </div>

    <!-- Bagian Header Website (Dibuat Jauh Lebih Tipis / Kompak) -->
    <header class="relative z-10 bg-[#0b0e14]/80 backdrop-blur-lg border-b border-white/5 px-3 py-1.5 flex flex-col md:flex-row justify-between items-center gap-2 shadow-[0_4px_20px_rgba(0,0,0,0.5)] min-h-[44px] transition-all duration-300">

        <!-- Bagian Kiri: Logo AffannnHs Monitor -->
        <div class="flex items-center gap-2 w-full md:w-1/4 justify-center md:justify-start group cursor-default">
            <div class="bg-gradient-to-tr from-yellow-600 to-yellow-300 p-1 rounded-md shadow-lg group-hover:rotate-12 transition-transform duration-300">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-[#0b0e14]" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
            </div>
            <h1 class="text-sm md:text-base font-extrabold tracking-wider text-white whitespace-nowrap">
                AffannnHs <span class="bg-clip-text text-transparent bg-gradient-to-r from-yellow-400 to-yellow-200 text-glow">Monitor</span>
            </h1>
        </div>

        <!-- Bagian Tengah: CUSTOM TICKER (Ukurannya Diperkecil & Ramping) -->
        <div class="w-full md:w-1/2 flex justify-center items-center h-[30px]">
            <div class="flex items-center gap-2.5 font-bold tracking-tight bg-white/5 px-3 py-1 rounded-xl border border-white/5 shadow-inner backdrop-blur-sm">
                <!-- Nama Simbol -->
                <span id="custom-ticker-symbol" class="text-white drop-shadow-md text-sm md:text-base">XAU/USD</span>
                <!-- Kotak Harga -->
                <span id="custom-ticker-price" class="bg-[#1e222d] text-slate-300 px-2 py-0.5 rounded-md min-w-[85px] text-center transition-all duration-300 border border-white/5 shadow-sm text-sm">
                    <span class="animate-pulse">Memuat...</span>
                </span>
                <!-- Perubahan & Persentase -->
                <span id="custom-ticker-change" class="text-slate-400 font-semibold text-xs md:text-sm whitespace-nowrap transition-colors duration-300">
                    --
                </span>
            </div>
        </div>

        <!-- Bagian Kanan: Tombol Switcher Asset & Status Koneksi -->
        <div class="flex flex-col items-center md:items-end gap-1.5 w-full md:w-1/4">
            <!-- Status Koneksi (Lebih kecil) -->
            <div class="text-[9px] uppercase tracking-widest font-bold text-[#787b86] flex items-center gap-1.5 whitespace-nowrap transition-colors duration-300 bg-black/20 px-2 py-0.5 rounded-full border border-white/5" id="conn-text-container">
                <span class="relative flex h-1.5 w-1.5">
                  <span id="conn-dot-ping" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                  <span id="conn-dot" class="relative inline-flex rounded-full h-1.5 w-1.5 bg-emerald-500 shadow-[0_0_8px_#10b981]"></span>
                </span>
                <span id="conn-text">Live Socket Aktif</span>
            </div>

            <!-- Tombol Switcher Interaktif (Lebih mungil) -->
            <div class="flex bg-black/40 rounded-lg p-0.5 border border-white/10 backdrop-blur-md shadow-inner">
                <button id="btn-XAU" onclick="switchAsset('XAU')" class="px-3 py-0.5 rounded-md bg-gradient-to-r from-yellow-600 to-yellow-500 text-white text-[10px] md:text-[11px] font-bold transition-all duration-300 shadow-md transform hover:scale-105 active:scale-95 whitespace-nowrap">
                    XAU (Emas)
                </button>
                <button id="btn-BTC" onclick="switchAsset('BTC')" class="px-3 py-0.5 rounded-md text-[#787b86] hover:text-white text-[10px] md:text-[11px] font-bold transition-all duration-300 transform hover:bg-white/5 hover:scale-105 active:scale-95 whitespace-nowrap">
                    BTC (Bitcoin)
                </button>
            </div>
        </div>
    </header>

    <!-- Area Utama untuk Chart -->
    <main class="flex-grow relative bg-[#0b0e14] w-full">
        <div class="absolute inset-0 w-full h-full">
            <div id="tradingview_chart" class="h-full w-full"></div>
        </div>
    </main>

    <!-- Bagian Footer (Lebih Tipis) -->
    <footer class="relative z-10 border-t border-white/5 py-1.5 px-3 flex justify-between items-center text-[9px] md:text-[10px] bg-[#0b0e14]/90 backdrop-blur-md">
        <p class="text-[#787b86] font-medium tracking-wide">
            Design & Engine <span class="bg-clip-text text-transparent bg-gradient-to-r from-yellow-400 to-orange-500 font-extrabold tracking-widest animate-pulse ml-1 text-glow">By AffannnHs</span>
        </p>
        <p class="text-[#787b86]/70 flex items-center gap-1 font-medium">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
            Powered by TradingView & Live API
        </p>
    </footer>

    <!-- Script Logika -->
    <script type="text/javascript">
        // ==========================================
        // 1. FITUR DETEKSI KONEKSI INTERNET
        // ==========================================
        const offlinePopup = document.getElementById('offline-popup');
        const connDotPing = document.getElementById('conn-dot-ping');
        const connDot = document.getElementById('conn-dot');
        const connText = document.getElementById('conn-text');
        const connTextContainer = document.getElementById('conn-text-container');

        function updateConnectionStatus() {
            if (navigator.onLine) {
                offlinePopup.classList.add('opacity-0', 'pointer-events-none', '-translate-y-8');
                offlinePopup.classList.remove('opacity-100', 'translate-y-0');
                connDotPing.classList.remove('hidden');
                connDot.classList.replace('bg-red-500', 'bg-emerald-500');
                connDot.classList.replace('shadow-[0_0_8px_#ef4444]', 'shadow-[0_0_8px_#10b981]');
                connText.innerText = 'Live Socket Aktif';
                if(currentAsset) initSuperRealtimeData(currentAsset); 
            } else {
                offlinePopup.classList.remove('opacity-0', 'pointer-events-none', '-translate-y-8');
                offlinePopup.classList.add('opacity-100', 'translate-y-0');
                connDotPing.classList.add('hidden'); 
                connDot.classList.replace('bg-emerald-500', 'bg-red-500');
                connDot.classList.replace('shadow-[0_0_8px_#10b981]', 'shadow-[0_0_8px_#ef4444]');
                connText.innerText = 'Koneksi Terputus';
            }
        }
        window.addEventListener('online', updateConnectionStatus);
        window.addEventListener('offline', updateConnectionStatus);

        // ==========================================
        // 2. FITUR SUPER REAL-TIME & ANIMASI FLASH
        // ==========================================
        let currentAsset = 'XAU';
        let pollingInterval = null;
        let liveSocket = null;
        let isIntentionalClose = false;
        let lastPriceValue = 0; // Untuk mendeteksi harga naik atau turun

        async function fetchInstantData(assetKey) {
            if (!navigator.onLine) return;
            const binanceSymbol = assetKey === 'XAU' ? 'PAXGUSDT' : 'BTCUSDT';
            const binanceUrl = `https://data-api.binance.vision/api/v3/ticker/24hr?symbol=${binanceSymbol}`;

            try {
                const response = await fetch(binanceUrl);
                const data = await response.json();
                updateTickerUI(parseFloat(data.lastPrice), parseFloat(data.priceChange), parseFloat(data.priceChangePercent));
            } catch (error) {
                const krakenPair = assetKey === 'XAU' ? 'PAXGUSD' : 'XBTUSD';
                try {
                    const kRes = await fetch(`https://api.kraken.com/0/public/Ticker?pair=${krakenPair}`);
                    const kData = await kRes.json();
                    const key = Object.keys(kData.result)[0];
                    const ticker = kData.result[key];
                    const cPrice = parseFloat(ticker.c[0]); 
                    const oPrice = parseFloat(ticker.o);    
                    const pChange = cPrice - oPrice;
                    const pPercent = (pChange / oPrice) * 100;
                    updateTickerUI(cPrice, pChange, pPercent);
                } catch (fallbackError) {
                    console.error("Gagal memuat data awal");
                }
            }
        }

        function initSuperRealtimeData(assetKey) {
            isIntentionalClose = true;
            if (liveSocket) liveSocket.close();
            if (pollingInterval) clearInterval(pollingInterval);
            lastPriceValue = 0; // Reset harga terakhir saat ganti aset

            fetchInstantData(assetKey);

            const streamName = assetKey === 'XAU' ? 'paxgusdt@ticker' : 'btcusdt@ticker';
            isIntentionalClose = false;
            liveSocket = new WebSocket(`wss://stream.binance.com:9443/ws/${streamName}`);

            liveSocket.onmessage = function(event) {
                const data = JSON.parse(event.data);
                updateTickerUI(parseFloat(data.c), parseFloat(data.p), parseFloat(data.P));
            };

            liveSocket.onclose = function() {
                if (!isIntentionalClose) {
                    connText.innerText = 'Mode Fast Polling';
                    pollingInterval = setInterval(() => { fetchInstantData(currentAsset); }, 1000);
                }
            };
        }

        function updateTickerUI(currentPrice, priceChange, percentChange) {
            const priceEl = document.getElementById('custom-ticker-price');
            const changeEl = document.getElementById('custom-ticker-change');

            const formattedPrice = currentPrice.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            const isUp = priceChange >= 0;
            const sign = isUp ? '+' : '';

            priceEl.innerText = formattedPrice;
            changeEl.innerText = `${sign}${priceChange.toFixed(2)} (${sign}${percentChange.toFixed(2)}%)`;

            // Logika Animasi Flash Keren
            if (lastPriceValue !== 0 && currentPrice !== lastPriceValue) {
                // Hapus class animasi sebelumnya jika masih ada
                priceEl.classList.remove('flash-up', 'flash-down');

                // Trigger reflow agar animasi bisa diulang
                void priceEl.offsetWidth; 

                if (currentPrice > lastPriceValue) {
                    priceEl.classList.add('flash-up');
                } else {
                    priceEl.classList.add('flash-down');
                }
            }
            lastPriceValue = currentPrice;

            // Update Warna Dasar (Ukuran font dibuat lebih kecil / kompak menyesuaikan)
            if (isUp) {
                priceEl.className = `bg-[#1e3a2f] text-emerald-400 px-2 py-0.5 rounded-md min-w-[85px] text-center shadow-sm border border-emerald-900/50 text-sm ${priceEl.classList.contains('flash-up') ? 'flash-up' : ''}`;
                changeEl.className = "text-emerald-500 font-bold text-xs md:text-sm whitespace-nowrap drop-shadow-[0_0_5px_rgba(16,185,129,0.3)]";
            } else {
                priceEl.className = `bg-[#3a1e1e] text-red-400 px-2 py-0.5 rounded-md min-w-[85px] text-center shadow-sm border border-red-900/50 text-sm ${priceEl.classList.contains('flash-down') ? 'flash-down' : ''}`;
                changeEl.className = "text-red-500 font-bold text-xs md:text-sm whitespace-nowrap drop-shadow-[0_0_5px_rgba(239,68,68,0.3)]";
            }
        }

        // ==========================================
        // 3. FITUR SWITCHER ASSET & TRADINGVIEW CHART
        // ==========================================
        const assets = {
            XAU: { symbolTV: "OANDA:XAUUSD", title: "XAU/USD" },
            BTC: { symbolTV: "BINANCE:BTCUSDT", title: "BTC/USD" }
        };

        function switchAsset(assetKey) {
            currentAsset = assetKey;
            const asset = assets[assetKey];

            // Animasi & Warna Tombol Modern (Lebih kecil)
            const activeClassXAU = "px-3 py-0.5 rounded-md bg-gradient-to-r from-yellow-600 to-yellow-500 text-white text-[10px] md:text-[11px] font-bold transition-all duration-300 shadow-md transform hover:scale-105 active:scale-95 whitespace-nowrap";
            const activeClassBTC = "px-3 py-0.5 rounded-md bg-gradient-to-r from-orange-600 to-orange-500 text-white text-[10px] md:text-[11px] font-bold transition-all duration-300 shadow-md transform hover:scale-105 active:scale-95 whitespace-nowrap";
            const inactiveClass = "px-3 py-0.5 rounded-md text-[#787b86] hover:text-white text-[10px] md:text-[11px] font-bold transition-all duration-300 transform hover:bg-white/5 hover:scale-105 active:scale-95 whitespace-nowrap";

            document.getElementById('btn-XAU').className = (assetKey === 'XAU') ? activeClassXAU : inactiveClass;
            document.getElementById('btn-BTC').className = (assetKey === 'BTC') ? activeClassBTC : inactiveClass;

            // Loading state
            document.getElementById('custom-ticker-symbol').innerText = asset.title;
            document.getElementById('custom-ticker-price').innerHTML = '<span class="animate-pulse">Memuat...</span>';
            document.getElementById('custom-ticker-price').className = "bg-[#1e222d] text-slate-300 px-2 py-0.5 rounded-md min-w-[85px] text-center transition-all duration-300 border border-white/5 text-sm";
            document.getElementById('custom-ticker-change').innerText = "--";
            document.getElementById('custom-ticker-change').className = "text-slate-400 font-semibold text-xs md:text-sm whitespace-nowrap";

            initSuperRealtimeData(assetKey);

            // Tampilan Chart Menyatu dengan Tema Baru (#0b0e14)
            new TradingView.widget({
                "autosize": true,
                "symbol": asset.symbolTV,
                "interval": "60",
                "timezone": "Asia/Jakarta",
                "theme": "dark",
                "style": "1",
                "locale": "id",
                "enable_publishing": false,
                "backgroundColor": "#0b0e14",
                "gridColor": "#161a25",
                "hide_top_toolbar": false,
                "hide_legend": false,
                "save_image": false,
                "hide_volume": true, // <--- INI KUNCI UNTUK MENGHAPUS BATANG VOLUME DI BAWAH
                "container_id": "tradingview_chart",
                "toolbar_bg": "#0b0e14"
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            updateConnectionStatus();
            switchAsset('XAU');
        });
    </script>
</body>
</html>
